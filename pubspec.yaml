name: prueba1
description: "Walkmons — colección y fusión de monstruos."
publish_to: 'none'
version: 1.4.0+5

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.2
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  # Cuadrado 1024px; el login usa LogoJuego.png apaisado (669×373) — no usarlo directo aquí.
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/icon/app_icon.png
  web:
    generate: true
    image_path: assets/icon/app_icon.png
    background_color: "#FFFFFF"
    theme_color: "#FF6B00"
  windows:
    generate: true
    image_path: assets/icon/app_icon.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/
